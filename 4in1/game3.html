<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Guess the Number — Mini Project</title>

<style>
  :root {
    --bg: #0f1724;
    --card: #0b1220;
    --accent: #60a5fa;
    --muted: #9ca3af;
    --win: #16a34a;
    --lose: #dc2626;
  }
  * {
    box-sizing: border-box;
    font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
  }
  body {
    margin: 0;
    background: linear-gradient(180deg, #09203F, #537895 100%);
    color: #e6eef8;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    padding: 20px;
  }
  .card {
    width: min(850px, 150vw);   /* increased size */
    min-height: 420px;         /* taller card */
    background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.01));
    border-radius: 16px;
    padding: 24px;
    box-shadow: 0 6px 24px rgba(2,6,23,0.6);
    border: 1px solid rgba(255,255,255,0.05);
    text-align: center;
    position: relative;
  }
  h1 {
    font-size: 30px;
    margin-bottom: 16px;
    background: linear-gradient(to right, var(--accent), #38bdf8);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  input {
    padding: 12px;
    width: 120px;
    font-size: 23px;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.08);
    background: transparent;
    color: #e6eef8;
    text-align: center;
    margin-right: 10px;
  }
  button {
    padding: 10px 18px;
    font-size: 23px;
    border: 1px solid rgba(255,255,255);
    border-radius: 10px;
    background: rgba(255,255,255,0.04);
    color: inherit;
    cursor: pointer;
    transition: all 0.2s;
    margin: 4px;
  }
  button:hover {
    background: rgba(255,255,255,0.1);
  }
  #message {
    margin-top: 24px;
    font-size: 25px;
    font-weight: bold;
    color: var(--muted);
    min-height: 30px;
  }
  .meta {
    display: flex;
    justify-content: space-around;
    margin-top: 24px;
    font-size: 23px;
    flex-wrap: wrap;
  }
  .score-pill {
    background: rgba(255,255,255,0.05);
    padding: 8px 14px;
    border-radius: 999px;
    font-weight: 600;
    margin: 6px;
  }
  .home-btn {
    position: absolute;
    top: 12px;
    left: 12px;
    padding: 6px 14px;
    font-size: 20px;
    border-radius: 999px;
    background:transparent;
    color: #fff;
    text-decoration: none;
    transition: 0.2s;
    border: 1px solid rgba(255,255,255);

  }
  .home-btn:hover {
    background: #3b82f6;
  }
</style>
</head>
<body>
  <div class="card" role="application" aria-label="Guess the Number game">
    <a href="4in1.html" class="home-btn">🏠 Home</a>
    <h1>🎯 Guess the Number (1-100)</h1>
    <br>
    <div>
      <input type="number" id="guess" placeholder="Enter" min="1" max="100" />
      <button onclick="checkGuess()">Guess</button>
      <button onclick="restartGame()">Restart</button>
    </div>
    <br>
    <div id="message">Start guessing...</div><br>
    <div class="meta">
      <div class="score-pill">Attempts: <span id="attempts">0</span></div>
      <div class="score-pill">Best Score: <span id="best">—</span></div>
      <div class="score-pill">Wins: <span id="wins">0</span></div>
      <div class="score-pill">Losses: <span id="losses">0</span></div>
    </div>
  </div>

<script>
  let secretNumber = Math.floor(Math.random() * 100) + 1;
  let attempts = 0;
  let bestScore = null;
  let wins = 0;
  let losses = 0;
  const MAX_ATTEMPTS = 10; // limit for losing

  function checkGuess() {
    const guessInput = document.getElementById("guess");
    const guess = Number(guessInput.value);
    const message = document.getElementById("message");

    if (!guess || guess < 1 || guess > 100) {
      message.textContent = "⚠ Enter a number between 1 and 100!";
      return;
    }

    attempts++;
    document.getElementById("attempts").textContent = attempts;

    if (guess === secretNumber) {
      message.style.color = "var(--win)";
      message.textContent = `🎉 Correct! You guessed it in ${attempts} attempts.`;
      wins++;
      document.getElementById("wins").textContent = wins;
      if (bestScore === null || attempts < bestScore) {
        bestScore = attempts;
        document.getElementById("best").textContent = bestScore;
      }
    } else if (attempts >= MAX_ATTEMPTS) {
      message.style.color = "var(--lose)";
      message.textContent = `❌ You lost! The number was ${secretNumber}.`;
      losses++;
      document.getElementById("losses").textContent = losses;
    } else if (guess < secretNumber) {
      message.style.color = "var(--muted)";
      message.textContent = "⬆ Too low! Try again.";
    } else {
      message.style.color = "var(--muted)";
      message.textContent = "⬇ Too high! Try again.";
    }

    guessInput.value = "";
    guessInput.focus();
  }

  function restartGame() {
    secretNumber = Math.floor(Math.random() * 100) + 1;
    attempts = 0;
    document.getElementById("attempts").textContent = attempts;
    document.getElementById("message").style.color = "var(--muted)";
    document.getElementById("message").textContent = "Start guessing...";
    document.getElementById("guess").value = "";
  }
</script>
</body>
</html>
